    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arsenal | Curated Tech Gear</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">CRAIG<span>LIST</span></a></div>
            <ul>
                <li><a href="index.html#intel">INTEL</a></li>
                <li><a href="arsenal.html" class="active">ARSENAL</a></li>
                <li><a href="about.html">ABOUT</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="arsenal-header">
            <h2 class="section-label" style="margin-top:4rem;">HARDWARE MANIFEST</h2>
            <h1>The Arsenal</h1>
            <p class="subtitle">My full technical inventory for field work and development.</p>
        </section>

        <div id="arsenal-list"></div>
    </main>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('arsenal-list');
                data.loadout.forEach(item => {
                    const section = document.createElement('section');
                    section.className = 'featured-pick reveal';
                    section.innerHTML = `
                        <div class="pick-badge">#${item.id} // ${item.category}</div>
                        <div class="pick-content flex-layout">
                            <div class="pick-info">
                                <h2>${item.name}</h2>
                                <p class="pick-description">${item.description}</p>
                                <ul class="spec-list">
                                    ${Object.entries(item.specs).map(([key, val]) => `<li><strong>${key.toUpperCase()}:</strong> ${val}</li>`).join('')}
                                </ul>
                                <a href="${item.link}" target="_blank" class="btn-amazon">VIEW ON AMAZON</a>
                            </div>
                            <div class="pick-image">
                                <img src="${item.image}" alt="${item.name}">
                            </div>
                        </div>
                    `;
                    container.appendChild(section);
                });
            });
    </script>
</body>
</html>
